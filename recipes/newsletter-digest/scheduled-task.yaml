# Scheduled task definition for the daily newsletter digest.
#
# NanoClaw stores scheduled tasks in the `scheduled_tasks` table of
# `store/messages.db`. There's no `apply this YAML` CLI yet — this file
# documents the row you need to insert (or create via `schedule_task` IPC).
#
# Replace placeholders:
#   <your-group-folder>   — e.g. "whatsapp_main"
#   <your-chat-jid>       — the channel/chat that receives the WhatsApp summary
#                           (for a WhatsApp group: <id>@g.us; for a DM: <phone>@s.whatsapp.net)

id: newsletter-digest
group_folder: <your-group-folder>
chat_jid: <your-chat-jid>

schedule_type: cron
schedule_value: "0 5 * * *"  # daily at 05:00 in the configured timezone

# The scheduler interprets cron in the TZ NanoClaw was configured with
# (process.env.TZ, .env TZ, or host timezone). See src/config.ts.

status: active
context_mode: isolated

prompt: |
  Run the daily newsletter digest. Follow the Daily Newsletter Digest
  instructions in CLAUDE.md exactly.
